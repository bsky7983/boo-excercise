jobs:
  security-scan:
    name: 'IaC Security Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. tfsec: 기존 버전 그대로 사용하되, SARIF 출력 설정만 추가
      - name: tfsec - Terraform 보안 스캔
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_args: --format sarif --out tfsec.sarif # 이 줄을 추가하여 파일 생성

      # 2. checkov: 기존 구성 유지 + SARIF 출력 설정 추가
      - name: checkov - IaC 컴플라이언스 스캔
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          soft_fail: true
          format: sarif # 출력 형식을 sarif로 지정
          output_file_path: checkov.sarif # 결과 파일명 지정

      # 3. 결과 업로드 (이 단계를 추가해야 Security 탭에 나타납니다)
      - name: Upload tfsec results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec.sarif

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  terraform:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: security-scan
    environment: production
    steps:
    - uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: AWS Credentials 설정
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Terraform Init
      run: terraform init
      working-directory: terraform/

    - name: Terraform Plan
      run: terraform plan -var="mongodb_password=${{ secrets.MONGODB_PASSWORD }}" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
      working-directory: terraform/

    - name: Terraform Apply (main 브랜치만)
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve -var="mongodb_password=${{ secrets.MONGODB_PASSWORD }}"
      working-directory: terraform/
