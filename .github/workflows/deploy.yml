name: '2.Build & Deploy Pipeline'

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

# ──────────────────────────────────────────────────────────────
# Job 1: 컨테이너 보안 스캔
# ──────────────────────────────────────────────────────────────
jobs:
  container-security-scan:
    name: 'Container Security Scan'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Docker 이미지 빌드 (스캔용)
      run: docker build -t boo-exercise-app:scan ./app

    - name: Trivy - 컨테이너 이미지 취약점 스캔
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'boo-exercise-app:scan'
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '0'

    - name: GitHub Security tab에 결과 업로드
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

# ──────────────────────────────────────────────────────────────
# Job 2: ECR 빌드 & 푸시
# ──────────────────────────────────────────────────────────────
  build-and-push:
    name: 'Build & Push to ECR'
    runs-on: ubuntu-latest
    needs: container-security-scan
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
    - uses: actions/checkout@v4

    - name: AWS Credentials 설정
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: ECR 로그인
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: 이미지 빌드 & ECR 푸시
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/boo-exercise-app:latest ./app
        docker push $ECR_REGISTRY/boo-exercise-app:latest
        echo "image=$ECR_REGISTRY/boo-exercise-app:latest" >> $GITHUB_OUTPUT

# ──────────────────────────────────────────────────────────────
# Job 3: ALB Controller 인프라 셋업 (최초 1회 or 변경 시만)
#
# [수정 핵심] IAM Policy URL을 v2.6.0 → latest로 변경
#   - v2.6.0 policy에는 elasticloadbalancing:DescribeListenerAttributes
#     가 누락되어 있음 → 현재 Helm chart 최신 버전 요구 권한과 불일치
#   - latest URL을 사용하면 Helm chart 버전과 항상 일치
#
# [구조 개선] deploy job에서 IAM/IRSA/Helm 설치를 분리
#   - 매 push마다 실행되면 iamserviceaccount 재생성 충돌 발생
#   - workflow_dispatch(수동) 트리거로만 실행 가능하게 분리
# ──────────────────────────────────────────────────────────────
  setup-alb-controller:
    name: 'Setup ALB Controller (run once)'
    runs-on: ubuntu-latest
    needs: build-and-push
    # 수동 실행(workflow_dispatch) 시에만 이 job을 실행
    # push 시에는 건너뜀 → 이미 설치된 경우 재충돌 방지
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4

    - name: AWS Credentials 설정
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: kubectl 설정
      run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name boo-exercise-cluster

    - name: Helm 설치
      uses: azure/setup-helm@v3

    - name: eksctl 설치
      run: |
        curl --silent --location \
          "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" \
          | tar xz -C /tmp
        sudo mv /tmp/eksctl /usr/local/bin

    # ★ 핵심 수정: IAM Policy를 latest URL에서 받아옴
    #   v2.6.0 고정 URL → main 브랜치 latest URL로 변경
    #   DescribeListenerAttributes 등 신규 권한이 모두 포함된 버전
    - name: LB Controller IAM Policy 생성 (latest)
      run: |
        curl -o lb-policy.json \
          https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/main/docs/install/iam_policy.json
        aws iam create-policy \
          --policy-name AWSLoadBalancerControllerIAMPolicy \
          --policy-document file://lb-policy.json 2>/dev/null \
          || echo "Policy already exists — updating to latest version"

        # 이미 존재하는 경우 최신 버전으로 교체
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        EXISTING=$(aws iam list-policy-versions \
          --policy-arn arn:aws:iam::${AWS_ACCOUNT_ID}:policy/AWSLoadBalancerControllerIAMPolicy \
          --query 'Versions[?!IsDefaultVersion].VersionId' \
          --output text 2>/dev/null | head -1)

        if [ -n "$EXISTING" ]; then
          aws iam delete-policy-version \
            --policy-arn arn:aws:iam::${AWS_ACCOUNT_ID}:policy/AWSLoadBalancerControllerIAMPolicy \
            --version-id "$EXISTING" 2>/dev/null || true
        fi

        aws iam create-policy-version \
          --policy-arn arn:aws:iam::${AWS_ACCOUNT_ID}:policy/AWSLoadBalancerControllerIAMPolicy \
          --policy-document file://lb-policy.json \
          --set-as-default 2>/dev/null || true

    - name: OIDC Provider 연결
      run: |
        eksctl utils associate-iam-oidc-provider \
          --region ${{ secrets.AWS_REGION }} \
          --cluster boo-exercise-cluster \
          --approve

    - name: LB Controller용 IAM ServiceAccount 생성
      run: |
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        eksctl create iamserviceaccount \
          --cluster=boo-exercise-cluster \
          --namespace=kube-system \
          --name=aws-load-balancer-controller \
          --attach-policy-arn=arn:aws:iam::${AWS_ACCOUNT_ID}:policy/AWSLoadBalancerControllerIAMPolicy \
          --override-existing-serviceaccounts \
          --approve

    - name: AWS Load Balancer Controller 설치 (Helm)
      run: |
        helm repo add eks https://aws.github.io/eks-charts
        helm repo update
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
          -n kube-system \
          --set clusterName=boo-exercise-cluster \
          --set serviceAccount.create=false \
          --set serviceAccount.name=aws-load-balancer-controller
        kubectl rollout status deployment/aws-load-balancer-controller \
          -n kube-system --timeout=120s

# ──────────────────────────────────────────────────────────────
# Job 4: EKS 배포 (매 push마다 실행)
# ──────────────────────────────────────────────────────────────
  deploy:
    name: 'Deploy to EKS'
    runs-on: ubuntu-latest
    # setup-alb-controller는 workflow_dispatch에서만 실행되므로
    # push 시에는 build-and-push 완료 후 바로 실행
    needs: build-and-push
    steps:
    - uses: actions/checkout@v4

    - name: AWS Credentials 설정
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: kubectl 설정
      run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name boo-exercise-cluster

    - name: deployment.yaml에 실제 값 주입
      env:
        IMAGE: ${{ needs.build-and-push.outputs.image }}
      run: |
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        MONGODB_PRIVATE_IP=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=boo-exercise-mongodb" \
                    "Name=instance-state-name,Values=running" \
          --query 'Reservations[0].Instances[0].PrivateIpAddress' \
          --output text)
        echo "MongoDB IP: $MONGODB_PRIVATE_IP"
        sed -i "s|<AWS_ACCOUNT_ID>|$AWS_ACCOUNT_ID|g" k8s/deployment.yaml
        sed -i "s|<MONGODB_PRIVATE_IP>|$MONGODB_PRIVATE_IP|g" k8s/deployment.yaml

    - name: RBAC 배포 (ServiceAccount + ClusterRoleBinding)
      run: kubectl apply -f k8s/rbac.yaml

    - name: Deployment 배포
      run: kubectl apply -f k8s/deployment.yaml

    - name: Service 배포
      run: kubectl apply -f k8s/service.yaml

    - name: ingress.yaml에 서브넷 ID 주입
      run: |
        SUBNET_IDS=$(aws ec2 describe-subnets \
          --filters "Name=tag:Name,Values=boo-exercise-public*" \
          --query 'Subnets[*].SubnetId' \
          --output text \
          --region ${{ secrets.AWS_REGION }} | tr '\t' ',')
        echo "서브넷 IDs: $SUBNET_IDS"
        sed -i "s|PLACEHOLDER_SUBNETS|$SUBNET_IDS|g" k8s/ingress.yaml

    - name: Ingress 배포
      run: kubectl apply -f k8s/ingress.yaml

    - name: 롤아웃 완료 대기
      run: kubectl rollout status deployment/todo-app --timeout=300s

    - name: 배포 결과 확인
      run: |
        kubectl get pods -o wide
        kubectl get svc
        kubectl get ingress

    - name: ALB URL 확인
      run: |
        echo "ALB 생성 대기 중... (최대 3분)"
        for i in {1..18}; do
          ALB_URL=$(kubectl get ingress todo-app-ingress \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          if [ -n "$ALB_URL" ]; then
            echo "웹 애플리케이션 URL: http://$ALB_URL"
            break
          fi
          echo "  대기 중... ($((i*10))초)"
          sleep 10
        done
