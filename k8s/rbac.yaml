---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-app-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: todo-app-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin # 클러스터 전체 admin 권한
subjects:
- kind: ServiceAccount
  name: todo-app-sa
  namespace: default
